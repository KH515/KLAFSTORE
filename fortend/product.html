<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAF - المنتج</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <h1 onclick="window.location.href='/'" style="cursor:pointer">KLAF</h1>
    <div>
      <span id="userName"></span>
      <button onclick="window.location.href='/orders'">طلباتي</button>
      <button onclick="window.location.href='/'">المتجر</button>
      <button id="logoutBtn" onclick="logout()" style="display:none">خروج</button>
      <button id="loginBtn" onclick="window.location.href='/login'">دخول</button>
    </div>
  </nav>
  <div id="productDetails"><p>جاري التحميل...</p></div>
  <p id="message"></p>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    const user = getUser();
    if (user) {
      document.getElementById('userName').textContent = `أهلاً ${user.name}`;
      document.getElementById('logoutBtn').style.display = 'inline';
      document.getElementById('loginBtn').style.display = 'none';
    }
    const slug = window.location.pathname.split('/').pop();
    async function loadProduct() {
      const res = await fetch(`${API_URL}/api/products/slug/${slug}`);
      const product = await res.json();
      if (!res.ok) { document.getElementById('productDetails').innerHTML = '<p>المنتج غير موجود</p>'; return; }
      document.title = `KLAF - ${product.name}`;
      document.getElementById('productDetails').innerHTML = `
        <div style="max-width:600px; margin:auto; padding:20px;">
          <img src="${product.image_url}" alt="${product.name}" style="width:100%; border-radius:8px;" />
          <h2>${product.name}</h2>
          ${product.category ? `<p style="color:gray;">التصنيف: ${product.category}</p>` : ''}
          <p>${product.description}</p>
          <h3>${product.price} ريال</h3>
          <p>المخزون: ${product.stock}</p>
          <button onclick="addToCart(${JSON.stringify(product).replace(/\"/g, '&quot;')}); document.getElementById('message').textContent='تمت الإضافة للسلة ✅'">أضف للسلة 🛒</button>
        </div>
      `;
    }
    loadProduct();
  </script>
</body>
</html>
