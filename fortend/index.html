<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAF - المتجر</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- شريط التنقل -->
  <nav>
    <h1>KLAF</h1>
    <div>
      <span id="userName"></span>
      <button onclick="window.location.href='orders.html'">طلباتي</button>
      <button onclick="showCart()">🛒 <span id="cartCount">0</span></button>
      <button onclick="logout()">خروج</button>
    </div>
  </nav>

  <!-- المنتجات -->
  <h2>المنتجات</h2>
  <div id="products"></div>

  <!-- سلة المشتريات -->
  <div id="cartModal" style="display:none">
    <h2>سلة المشتريات</h2>
    <div id="cartItems"></div>
    <p>المجموع: <span id="cartTotal"></span> ريال</p>
    <input type="text" id="address" placeholder="عنوان التوصيل" />
    <button onclick="checkout()">تأكيد الطلب</button>
    <button onclick="hideCart()">إغلاق</button>
  </div>

  <p id="message"></p>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // تحقق من تسجيل الدخول
    requireLogin();

    // عرض اسم المستخدم
    const user = getUser();
    document.getElementById('userName').textContent = `أهلاً ${user.name}`;

    // جيب المنتجات
    async function loadProducts() {
      const res = await getProducts();
      if (!res.ok) return;

      const container = document.getElementById('products');
      container.innerHTML = '';

      res.data.forEach(product => {
        container.innerHTML += `
          <div>
            <img src="${product.image_url}" alt="${product.name}" width="150" />
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <p>${product.price} ريال</p>
            <p>المخزون: ${product.stock}</p>
            <button onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})">
              أضف للسلة
            </button>
          </div>
        `;
      });
    }

    // عرض السلة
    function showCart() {
      const cart = getCart();
      const cartItems = document.getElementById('cartItems');
      cartItems.innerHTML = '';

      cart.forEach(item => {
        cartItems.innerHTML += `
          <div>
            <span>${item.name}</span>
            <span>${item.price} ريال</span>
            <input type="number" value="${item.quantity}" min="1"
              onchange="updateQuantity(${item.id}, parseInt(this.value))" />
            <button onclick="removeFromCart(${item.id})">حذف</button>
          </div>
        `;
      });

      document.getElementById('cartTotal').textContent = getCartTotal();
      document.getElementById('cartModal').style.display = 'block';
    }

    function hideCart() {
      document.getElementById('cartModal').style.display = 'none';
    }

    // تأكيد الطلب
    async function checkout() {
      const cart = getCart();
      const address = document.getElementById('address').value;

      if (!address) {
        document.getElementById('message').textContent = 'أدخل عنوان التوصيل';
        return;
      }

      if (cart.length === 0) {
        document.getElementById('message').textContent = 'السلة فاضية';
        return;
      }

      const items = cart.map(item => ({
        product_id: item.id,
        quantity: item.quantity
      }));

      const res = await createOrder({
        user_id: user.id,
        items,
        address
      });

      if (res.ok) {
        clearCart();
        hideCart();
        document.getElementById('message').textContent = 'تم إرسال طلبك بنجاح!';
      } else {
        document.getElementById('message').textContent = res.data.error;
      }
    }

    // تحميل المنتجات عند فتح الصفحة
    loadProducts();
    updateCartCount();
  </script>

</body>
</html>
