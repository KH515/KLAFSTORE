<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAF - لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <h1>KLAF - لوحة التحكم</h1>
    <div>
      <button onclick="showTab('products')">المنتجات</button>
      <button onclick="showTab('orders')">الطلبات</button>
      <button onclick="logout()">خروج</button>
    </div>
  </nav>

  <div id="tab-products">
    <h2>المنتجات</h2>
    <div>
      <h3>إضافة منتج جديد</h3>
      <input type="text" id="pName" placeholder="اسم المنتج" />
      <input type="text" id="pDesc" placeholder="الوصف" />
      <input type="number" id="pPrice" placeholder="السعر" />
      <input type="number" id="pStock" placeholder="المخزون" />
      <input type="text" id="pImage" placeholder="رابط الصورة" />
      <button onclick="addNewProduct()">إضافة</button>
    </div>
    <div id="productsList"></div>
  </div>

  <div id="tab-orders" style="display:none">
    <h2>الطلبات</h2>
    <table border="1" cellpadding="8" cellspacing="0" width="100%">
      <thead>
        <tr>
          <th>#</th>
          <th>رقم العميل</th>
          <th>الجوال</th>
          <th>العنوان</th>
          <th>المجموع</th>
          <th>التاريخ</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody id="ordersList"></tbody>
    </table>
  </div>

  <p id="message"></p>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    requireAdmin();

    function showTab(tab) {
      document.getElementById('tab-products').style.display = tab === 'products' ? 'block' : 'none';
      document.getElementById('tab-orders').style.display = tab === 'orders' ? 'block' : 'none';
      if (tab === 'orders') loadOrders();
    }

    async function loadProducts() {
      const res = await getProducts();
      if (!res.ok) return;
      const container = document.getElementById('productsList');
      container.innerHTML = '';
      res.data.forEach(product => {
        container.innerHTML += `
          <div>
            <h3>${product.name}</h3>
            <p>${product.price} ريال | المخزون: ${product.stock}</p>
            <button onclick="deleteProductById(${product.id})">حذف</button>
          </div>
        `;
      });
    }

    async function addNewProduct() {
      const product = {
        name: document.getElementById('pName').value,
        description: document.getElementById('pDesc').value,
        price: parseFloat(document.getElementById('pPrice').value),
        stock: parseInt(document.getElementById('pStock').value),
        image_url: document.getElementById('pImage').value
      };
      const res = await addProduct(product);
      if (res.ok) {
        document.getElementById('message').textContent = 'تم إضافة المنتج ✅';
        loadProducts();
      }
    }

    async function deleteProductById(id) {
      if (!confirm('تأكيد الحذف؟')) return;
      const res = await deleteProduct(id);
      if (res.ok) {
        document.getElementById('message').textContent = 'تم الحذف ✅';
        loadProducts();
      }
    }

    async function loadOrders() {
      const res = await getAllOrders();
      if (!res.ok) return;
      const tbody = document.getElementById('ordersList');
      tbody.innerHTML = '';
      if (res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">لا يوجد طلبات</td></tr>';
        return;
      }
      res.data.forEach(order => {
        tbody.innerHTML += `
          <tr>
            <td>${order.id}</td>
            <td>${order.user_id}</td>
            <td>${order.phone || '-'}</td>
            <td>${order.address}</td>
            <td>${order.total} ريال</td>
            <td>${new Date(order.created_at).toLocaleDateString('ar-SA')}</td>
            <td>
              <select onchange="changeStatus(${order.id}, this.value)">
                <option value="pending" ${order.status==='pending'?'selected':''}>⏳ قيد الانتظار</option>
                <option value="processing" ${order.status==='processing'?'selected':''}>⚙️ جاري التجهيز</option>
                <option value="shipped" ${order.status==='shipped'?'selected':''}>🚚 في الطريق</option>
                <option value="delivered" ${order.status==='delivered'?'selected':''}>✅ تم التوصيل</option>
              </select>
            </td>
          </tr>
        `;
      });
    }

    async function changeStatus(id, status) {
      const res = await updateOrderStatus(id, status);
      if (res.ok) document.getElementById('message').textContent = 'تم تحديث الحالة ✅';
    }

    loadProducts();
  </script>

</body>
</html>
