<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAF - طلباتي</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- شريط التنقل -->
  <nav>
    <h1>KLAF</h1>
    <div>
      <span id="userName"></span>
      <button onclick="window.location.href='index.html'">المتجر</button>
      <button onclick="logout()">خروج</button>
    </div>
  </nav>

  <h2>طلباتي</h2>
  <div id="orders"></div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    requireLogin();

    const user = getUser();
    document.getElementById('userName').textContent = `أهلاً ${user.name}`;

    async function loadOrders() {
      const res = await getUserOrders(user.id);
      if (!res.ok) return;

      const container = document.getElementById('orders');

      if (res.data.length === 0) {
        container.innerHTML = '<p>ما عندك طلبات بعد</p>';
        return;
      }

      res.data.forEach(order => {
        const statusMap = {
          'pending': '⏳ قيد الانتظار',
          'processing': '⚙️ جاري التجهيز',
          'shipped': '🚚 في الطريق',
          'delivered': '✅ تم التوصيل'
        };

        container.innerHTML += `
          <div>
            <h3>طلب رقم #${order.id}</h3>
            <p>الحالة: ${statusMap[order.status] || order.status}</p>
            <p>المجموع: ${order.total} ريال</p>
            <p>العنوان: ${order.address}</p>
            <p>التاريخ: ${new Date(order.created_at).toLocaleDateString('ar-SA')}</p>
          </div>
        `;
      });
    }

    loadOrders();
  </script>

</body>
</html>
